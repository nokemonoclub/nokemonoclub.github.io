# サイトの基本情報
title: NOKEMONO CLUB
description: あなたのための音楽紹介サイト
email: your-email@example.com

# URL設定（ここが重要です）
# リポジトリ名が nokemonoclub.github.io の場合、baseurlは空にします
baseurl: "" 
url: "https://nokemonoclub.github.io"

# SNS・外部連携（任意で書き換えてください）
twitter_username: 
github_username: nokemonoclub

# ビルド設定
# 手動で作成した default.html を使うため、テーマは無効化するか
# minimaのままにする場合は、_layouts フォルダのファイルを優先させます
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate
# 記事のURL形式
# 元の設定に合わせて .html を付与する形にしています
permalink: /:title.html

# 未来の日付の記事も表示する設定
future: true

# 除外設定
exclude:
  - Gemfile
  - Gemfile.lock
  - .jekyll-cache/
  - .git/
paginate: 5
paginate_path: "/page:num/"

