<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | NOKEMONO CLUB</title>

  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial; background: #f7f7f7; }
    header { background: white; padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-weight: bold; font-size: 20px; }
    .menu { font-size: 14px; color: gray; }
    .container { max-width: 680px; margin: 20px auto; padding: 0 15px; }
    .card { display: flex; background: white; margin-bottom: 20px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; }
    .card:hover { transform: translateY(-2px); }
    .card img { width: 120px; object-fit: cover; }
    .card-content { padding: 15px; flex: 1; }
    .title { font-size: 18px; margin-bottom: 8px; }
    .date { font-size: 12px; color: gray; margin-bottom: 8px; }
    .excerpt { font-size: 14px; color: #444; }
    a { text-decoration: none; color: black; }
    @media (max-width: 600px) { .card { flex-direction: column; } .card img { width: 100%; height: 180px; } }
  </style>
</head>
<body>

<header>
  <div class="logo">NOKEMONO CLUB</div>
  <div class="menu">記事一覧</div>
</header>

<div class="container">
  {{ content }}
</div>

</body>
</html>
