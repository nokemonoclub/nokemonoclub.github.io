---
layout: default
---
<style>
  /* 記事ページ専用のスタイル */
  .menu a { font-size: 14px; color: gray; text-decoration: none; }
  .article { background: white; padding: 25px; border-radius: 12px; }
  .article img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
  h1 { font-size: 24px; margin-bottom: 10px; }
  .date { color: gray; font-size: 13px; margin-bottom: 20px; }
  p { line-height: 1.9; font-size: 16px; color: #333; margin-bottom: 20px; }
  @media (max-width: 600px) { h1 { font-size: 20px; } .article { padding: 20px; } }
</style>

<div class="menu">
  <a href="/">← 記事一覧へ</a>
</div>

<div class="article">
  {{ content }}
</div>
