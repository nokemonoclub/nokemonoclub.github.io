---
layout: default
title: 雑記記事一覧
---



{% for post in site.posts %}
  {% if post.category == "雑記" %}
    <a href="{{ post.url }}">
      <div class="card" style="height: 120px; align-items: center; display: flex; background: white; margin-bottom: 20px; border-radius: 4px; overflow: hidden; border: 1px solid #eee;">
        <div style="width: 150px; height: 120px; flex-shrink: 0;">
          <img src="/assets/images/{{ post.thumbnail }}" alt="サムネイル" 
               style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        
        <div class="card-content" style="flex: 1; padding-left: 20px;">
          <div class="date" style="font-size: 11px; color: #999; margin-bottom: 5px;">
            {{ post.date | date: "%Y年%m月%d日" }}
          </div>
          <div class="title" style="font-size: 18px; font-weight: bold; color: #333;">
            {{ post.title }}
          </div>
        </div>
      </div>
    </a>
  {% endif %}
{% endfor %}
