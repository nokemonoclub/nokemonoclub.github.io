---
layout: default
title: Home
---

<div class="post-list">
{% for post in site.posts %}

  <a href="{{ post.url }}" class="card">

    <div class="thumb">
      {% if post.thumbnail %}
        <img src="/assets/images/{{ post.thumbnail }}" alt="サムネイル">
      {% endif %}
    </div>
    
    <div class="card-content">
      <div class="date">
        {{ post.date | date: "%Y年%m月%d日" }}
      </div>
      <div class="title">
        {{ post.title }}
      </div>
    </div>

  </a>

{% endfor %}
</div>
